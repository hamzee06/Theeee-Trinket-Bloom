<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Form</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">
    <div class="bg-white p-8 rounded-lg shadow-xl w-full max-w-lg">
        <h1 class="text-3xl font-bold text-center text-gray-800 mb-6">Give Us Your Feedback</h1>
        <form id="feedbackForm" class="space-y-4">
            <div>
                <label for="name" class="block text-sm font-medium text-gray-700">Name</label>
                <input type="text" id="name" name="name" required
                       class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
            </div>
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700">Email</label>
                <input type="email" id="email" name="email" required
                       class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
            </div>
            <div>
                <label for="message" class="block text-sm font-medium text-gray-700">Message</label>
                <textarea id="message" name="message" rows="4" required
                          class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500"></textarea>
            </div>
            <button type="submit"
                    class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors duration-200">
                Submit Feedback
            </button>
        </form>
        <div id="statusMessage" class="mt-4 text-center text-sm font-medium"></div>
        
        <h2 class="text-2xl font-bold text-center text-gray-800 my-6">Recent Feedback</h2>
        <div id="feedbackList" class="space-y-4">
            <!-- Feedback items will be dynamically inserted here -->
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('feedbackForm');
            const statusMessage = document.getElementById('statusMessage');
            const feedbackList = document.getElementById('feedbackList');

            // Function to fetch and display feedback from the backend.
            const fetchFeedback = async () => {
                try {
                    const response = await fetch('http://localhost:3001/api/feedback');
                    const data = await response.json();

                    feedbackList.innerHTML = ''; // Clear previous content
                    if (data.data && data.data.length > 0) {
                        data.data.forEach(feedback => {
                            const feedbackItem = document.createElement('div');
                            feedbackItem.className = 'bg-gray-50 p-4 rounded-md shadow-sm border border-gray-200';
                            feedbackItem.innerHTML = `
                                <p class="text-gray-800 font-semibold">${feedback.name}</p>
                                <p class="text-gray-600 text-sm">${feedback.email}</p>
                                <p class="mt-2 text-gray-700">${feedback.message}</p>
                                <p class="mt-2 text-gray-500 text-xs">Submitted on: ${new Date(feedback.createdAt).toLocaleString()}</p>
                            `;
                            feedbackList.appendChild(feedbackItem);
                        });
                    } else {
                        feedbackList.innerHTML = '<p class="text-center text-gray-500">No feedback submitted yet.</p>';
                    }
                } catch (error) {
                    console.error('Error fetching feedback:', error);
                    feedbackList.innerHTML = '<p class="text-center text-red-500">Failed to load feedback. Please check server connection.</p>';
                }
            };
            
            // Initial fetch of feedback when the page loads.
            fetchFeedback();

            // Handle the form submission.
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                statusMessage.textContent = '';

                const formData = new FormData(form);
                const feedback = {
                    name: formData.get('name'),
                    email: formData.get('email'),
                    message: formData.get('message')
                };

                try {
                    const response = await fetch('http://localhost:3001/api/feedback', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(feedback)
                    });

                    const result = await response.json();

                    if (response.ok) {
                        statusMessage.className = 'mt-4 text-center text-sm font-medium text-green-600';
                        statusMessage.textContent = 'Feedback submitted successfully!';
                        form.reset(); // Clear the form fields
                        fetchFeedback(); // Refresh the feedback list
                    } else {
                        statusMessage.className = 'mt-4 text-center text-sm font-medium text-red-600';
                        statusMessage.textContent = `Error: ${result.error || result.message}`;
                    }
                } catch (error) {
                    console.error('Error submitting feedback:', error);
                    statusMessage.className = 'mt-4 text-center text-sm font-medium text-red-600';
                    statusMessage.textContent = 'Failed to connect to the server.';
                }
            });
        });
    </script>
</body>
</html>
